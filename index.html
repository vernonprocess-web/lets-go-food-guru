<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let Go Food Guru | Singapore Food Map</title>
    <meta name="description" content="Discover Singapore's best eats with Let Go Food Guru. Michelin Stars and Bib Gourmand recommendations at your fingertips.">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="guru-filter">
        <div class="brand">
            <h1>Let Go Food Guru</h1>
        </div>
        <nav class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-filter="all">Show All</button>
            <button class="filter-btn" data-filter="Stars">⭐ Stars</button>
            <button class="filter-btn" data-filter="Bib Gourmand">🍲 Bib Gourmand</button>
        </nav>
    </header>

    <main id="map"></main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/app.js"></script>
</body>
</html>
